meta:
  engine: 4.1.0
units:
  # cx = 18 mm
  # cy = 17 mm
  kx: cx + 1
  ky: cy + 1
  px: kx + 1
  py: ky + 1
  half_key_x: 0.5cx
  half_key_y: 0.5cy
  thumb_corridor: 4
  power_switch_width: 11.5
  pogo_pad_spacing: 5
  mcu_padding: 22
points:
  zones:
    matrix:
      # Fix placement on KiCAD sheet.
      anchor:
        shift: [80, -190]
      key:
        padding: cy
      columns:
        pinky:
          key:
            splay: 16
            spread: px
            column_net: P029
            mirror.column_net: P111
        ring:
          key:
            splay: -1
            stagger: 10
            spread: kx
            column_net: P002
            mirror.column_net: P113
        middle:
          key:
            splay: -4
            stagger: 6
            spread: px
            column_net: P115
            mirror.column_net: P115
        index:
          key:
            splay: -4
            stagger: -8
            spread: px
            column_net: P113
            mirror.column_net: P002
        inner:
          key:
            spread: cx
            stagger: -0.2ky
            column_net: P111
            mirror.column_net: P029
      rows:
        bottom:
          row_net: P100
        home:
          row_net: P024
        top:
          row_net: P022
    thumbs:
      anchor:
        ref: matrix_inner_bottom
        shift: [16, -ky]
      columns:
        mod1:
          key:
            splay: -15
            #asym: source
        mod2:
          key:
            spread: kx
            stagger: -1.5
            splay: -5
      rows:
        cluster:
          row_net: P011
outlines:
    switches:
      - what: rectangle
        where: true
        bound: false
        size: [15,15]
        
    pcb_outline:
      - what: polygon
        operation: stack
        fillet: 1
        # Order matters: go clockwise around the outside
        points:
          # Top edge (outermost tops)
          - ref: matrix_pinky_top    
            shift: [-half_key_x,  half_key_y]
          - ref: matrix_pinky_top    
            shift: [half_key_x,  half_key_y]
          - ref: matrix_ring_top     
            shift: [-half_key_x,  half_key_y]
          - ref: matrix_ring_top     
            shift: [half_key_x,  half_key_y]
          - ref: matrix_middle_top   
            shift: [-half_key_x,  half_key_y]
          - ref: matrix_middle_top   
            shift: [half_key_x,  half_key_y]

          - ref: matrix_index_top
            shift: [ -half_key_x,  half_key_y + pogo_pad_spacing]
          - ref: matrix_index_top
            shift: [ half_key_x + cx,  half_key_y + pogo_pad_spacing]

          # Make space for the battery, MCU and OLED
          - ref: matrix_inner_top
            shift: [ half_key_x,  1.5cy]
          - ref: matrix_inner_top
            shift: [ half_key_x + mcu_padding, 1.5cy]
          - ref: matrix_inner_top
            shift: [ half_key_x + mcu_padding, 1.5cy]

          # Cut-out for the power switch
          #- ref: matrix_inner_bottom
          #  shift: [ half_key_x + 4,  half_key_y + 0]
          - ref: matrix_inner_bottom
            shift: [ half_key_x + mcu_padding,  half_key_y - 0]
          - ref: matrix_inner_bottom
            shift: [ half_key_x + thumb_corridor,  half_key_y - 0]
          - ref: matrix_inner_bottom
            shift: [ half_key_x + thumb_corridor, half_key_y - 0 - power_switch_width]
            
          # Down into the thumb cluster
          - ref: thumbs_mod1_cluster 
            shift: [half_key_x, half_key_y]
          - ref: thumbs_mod2_cluster 
            shift: [ half_key_x,  half_key_y]
          - ref: thumbs_mod2_cluster 
            shift: [ half_key_x,  -half_key_y]
          - ref: thumbs_mod2_cluster 
            shift: [ -half_key_x,  -half_key_y]
          - ref: thumbs_mod1_cluster 
            shift: [-half_key_x, -half_key_y]

          # Back up the bottom edge of the matrix
          - ref: matrix_inner_bottom  
            shift: [0.45cx, -0.55cy]
          - ref: matrix_inner_bottom  
            shift: [-half_key_x, -half_key_y]
          - ref: matrix_index_bottom  
            shift: [0.45cx, -half_key_y]
          - ref: matrix_index_bottom  
            shift: [-half_key_x, -half_key_y]
          - ref: matrix_middle_bottom  
            shift: [half_key_x, -half_key_y]
          - ref: matrix_middle_bottom  
            shift: [-half_key_x, -half_key_y]
          - ref: matrix_ring_bottom  
            shift: [half_key_x, -half_key_y]
          - ref: matrix_ring_bottom  
            shift: [-half_key_x, -half_key_y]
          - ref: matrix_pinky_bottom 
            shift: [half_key_x, -half_key_y]
          - ref: matrix_pinky_bottom 
            shift: [-half_key_x, -half_key_y]

    combined:
      - name: pcb_outline
      - operation: subtract
        name: switches

    switch_block:
      # One big rectangle that bounds all switch positions
      - what: rectangle
        size: [300, 300]   # extra margin around the outermost switches
        adjust: 
          - shift: [120, -160]

      # Then subtract each switch “hole” from that big block
      - operation: subtract
        name: switches
pcbs:
  paw_left:
    outlines:
      main:
        outline: pcb_outline
    footprints:
      choc_hotswap:
        what: choc
        where: true
        params:
          keycaps: false
          reverse: false
          hotswap: false
          from: "{{column_net}}"
          to: "{{colrow}}"
      diode:
        what: diode
        where: true
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
        adjust:
          shift: [7.5, 2]
          rotate: 90
      mcu:
        what: nice_nano_2
        where:
          ref: matrix_inner_top
          shift: [kx + 1, 7.2]
          rotate: -90
      reset_switch:
        what: button
        params:
          from: GND
          to: RST
        where:
          ref: matrix_inner_home
          shift: [half_key_x + mcu_padding / 2, half_key_y / 2]
      battery_connector:
        what: battery_connector_jst_ph_2
        params:
          BAT_P: PAD_IN
          BAT_N: B-
          reversible: true
          side: B
        where:
          ref: matrix_inner_home
          shift: [half_key_x + thumb_corridor + 12, -half_key_y / 3]
          rotate: -90
      power_pad_in:
        what: via
        params:
          net: PAD_IN
        where:
          ref: matrix_inner_home
          shift: [half_key_x + thumb_corridor + mcu_padding / 2 + 4, -half_key_y + 6.5]
      power_pad_out:
        what: via
        params:
          net: B+
        where:
          ref: matrix_inner_home
          shift: [half_key_x + thumb_corridor + mcu_padding / 2 + 6, -half_key_y + 1.5]
  paw_right:
    outlines:
      main:
        outline: pcb_outline
    footprints:
      choc_hotswap:
        what: choc
        where: true
        params:
          keycaps: false
          reverse: false
          hotswap: false
          from: "{{column_net}}"
          to: "{{colrow}}"
      diode:
        what: diode
        where: true
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
        adjust:
          shift: [7.5, 2]
          rotate: 90
      mcu:
        what: nice_nano_2
        where:
          ref: matrix_inner_top
          shift: [kx + 1, 7.2]
          rotate: -90
        params:
          # It won't literally be up... this just helps us flip the pins
          # to reflect the fact that it's on the other side of the keyboad
          # (actually the rest of the keyboard is flipped in this case)
          orientation: 'up'
