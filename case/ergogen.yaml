meta:
  engine: 4.1.0
units:
  # cx = 18 mm
  # cy = 17 mm
  kx: cx + 1
  ky: cy + 1
  px: kx + 1
  py: ky + 1
  # This is way more space than the screws need... allows room for
  # an M2 heatset insert (3mm) + 2mm walls encasing this. The idea
  # is that this would go on the bottom of the keyplate and the 
  # screws come in from the undeside of the case, so they're hidden
  screwSize: 3.5
points:
  zones:
    matrix:
      # Fix placement on KiCAD sheet.
      anchor:
        shift: [80, -190]
      key:
        padding: cy
      columns:
        pinky:
          key:
            splay: 16
            spread: cx
        ring:
          key:
            splay: -1
            stagger: 10
            spread: px
        middle:
          key:
            splay: -4
            stagger: 6
            spread: px
        index:
          key:
            splay: -4
            stagger: -8
            spread: px
        inner:
          key:
            spread: cx
            stagger: -0.2ky
      rows:
        bottom:
        home:
        top:
    thumbs:
      anchor:
        ref: matrix_index_bottom
        shift: [1.5kx, -1.5ky]
      columns:
        mod1:
          key:
            splay: -25
            #asym: source
        mod2:
          key:
            spread: 21
            stagger: -1.5
            splay: -10
      rows:
        cluster:
  #mirror: &mirror
  #  ref: thumbs_mod3_cluster
  #  distance: 1.5kx          
outlines:
    switches:
      - what: rectangle
        where: true
        bound: false
        size: [15,15]
        
    lhs_outline:
      - what: polygon
        operation: stack
        fillet: 4
        # Order matters: go clockwise around the outside
        points:
          # Top edge (outermost tops)
          - ref: matrix_pinky_top    
            shift: [-0.55kx,  0.55ky]
          - ref: matrix_ring_top     
            shift: [-0.55kx,  0.55ky]
          - ref: matrix_middle_top   
            shift: [-0.50kx,  0.55ky]
          - ref: matrix_middle_top   
            shift: [.50kx,  0.55ky]

          # Make space for the battery, MCU and OLED
          - ref: matrix_inner_top
            shift: [ 0.55kx + 24,  1ky]
          - ref: matrix_inner_top
            shift: [ 0.55kx + 24,  -60]


          # Down into the thumb cluster
          - ref: thumbs_mod2_cluster 
            shift: [ 0.55kx,  0.55ky]
          - ref: thumbs_mod2_cluster 
            shift: [ 0.55kx,  -0.55ky]
          - ref: thumbs_mod2_cluster 
            shift: [ -0.55kx,  -0.55ky]
          - ref: thumbs_mod1_cluster 
            shift: [0.55kx, -0.55ky]
          - ref: thumbs_mod1_cluster 
            shift: [-0.55kx, -0.55ky]

          # Back up the bottom edge of the matrix
          - ref: matrix_inner_bottom  
            shift: [-0.55kx, -0.55ky]
          - ref: matrix_ring_bottom  
            shift: [-0.25kx, -0.55ky]
          - ref: matrix_pinky_bottom 
            shift: [0.50kx, -0.55ky]
          - ref: matrix_pinky_bottom 
            shift: [-0.50kx, -0.55ky]

    lhs:
      - name: lhs_outline
      - operation: subtract
        name: switches

    switch_block:
      # One big rectangle that bounds all switch positions
      - what: rectangle
        size: [300, 300]   # extra margin around the outermost switches
        adjust: 
          - shift: [120, -160]

      # Then subtract each switch “hole” from that big block
      - operation: subtract
        name: switches
pcbs:
  board:
    outlines:
      main:
        outline: lhs_outline
    footprints:
      choc_hotswap:
        what: choc
        where: true
        params:
          keycaps: true
          reverse: false
          hotswap: true
          from: "{{column_net}}"
          to: "{{colrow}}"
      diode:
        what: diode
        where: true
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
        adjust:
          shift: [0, -5]
      promicro:
        what: promicro
        params:
          orientation: "down"
        where:
          ref: matrix_inner_top
          shift: [kx + 5, 0.0ky]
          rotate: -92
      oled:
        what: oled
        params:
          side: "F"
          SDA: P2
          SCL: P3
        where:
          ref: matrix_inner_top
          shift: [kx + 10, -19]
          rotate: -90
      reset:
        what: button
        params:
          from: GND
          to: RST
        where:
          ref: matrix_index_top
          shift: [0, 0.5cy + 5]
      jst:
        what: jstph
        params:
          pos: B+
          neg: B-
        where:
          ref: matrix_inner_top
          shift: [0cx, 0.5cy + 5]
          rotate: -90
      power:
        what: button
        params:
          from: GND
          to: RST
        where:
          ref: matrix_inner_top
          shift: [0.5cx, 0.5cy + 5]