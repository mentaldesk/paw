meta:
  engine: 4.1.0
units:
  # cx = 18 mm
  # cy = 17 mm
  kx: cx + 1
  ky: cy + 1
  px: kx + 1
  py: ky + 1
  pogo_pad_spacing: 5
  mcu_padding: 22
points:
  zones:
    matrix:
      # Fix placement on KiCAD sheet.
      anchor:
        shift: [80, -190]
      key:
        padding: cy
      columns:
        pinky:
          key:
            splay: 16
            spread: px
        ring:
          key:
            splay: -1
            stagger: 10
            spread: kx
        middle:
          key:
            splay: -4
            stagger: 6
            spread: px
        index:
          key:
            splay: -4
            stagger: -8
            spread: px
        inner:
          key:
            spread: cx
            stagger: -0.2ky
      rows:
        bottom:
          row_net: P100
        home:
          row_net: P024
        top:
          row_net: P022
    thumbs:
      anchor:
        ref: matrix_inner_bottom
        shift: [16, -ky]
      columns:
        mod1:
          key:
            splay: -15
            #asym: source
        mod2:
          key:
            spread: kx
            stagger: -1.5
            splay: -5
      rows:
        cluster:
          row_net: P011
  mirror: &mirror
    ref: thumbs_mod2_cluster
    distance: 1.5kx          
outlines:
    switches:
      - what: rectangle
        where: true
        bound: false
        size: [15,15]
        
    pcb_outline:
      - what: polygon
        operation: stack
        fillet: 1
        # Order matters: go clockwise around the outside
        points:
          # Top edge (outermost tops)
          - ref: matrix_pinky_top    
            shift: [-0.5cx,  0.5cy]
          - ref: matrix_pinky_top    
            shift: [0.5cx,  0.5cy]
          - ref: matrix_ring_top     
            shift: [-0.5cx,  0.5cy]
          - ref: matrix_ring_top     
            shift: [0.5cx,  0.5cy]
          - ref: matrix_middle_top   
            shift: [-0.5cx,  0.5cy]
          - ref: matrix_middle_top   
            shift: [.5cx,  0.5cy]

          - ref: matrix_index_top
            shift: [ -0.5cx,  0.5cy + pogo_pad_spacing]
          - ref: matrix_index_top
            shift: [ 0.5cx + cx,  0.5cy + pogo_pad_spacing]

          # Make space for the battery, MCU and OLED
          - ref: matrix_inner_top
            shift: [ 0.5cx,  1.5cy]
          - ref: matrix_inner_top
            shift: [ 0.5cx + mcu_padding, 1.5cy]
          - ref: matrix_inner_top
            shift: [ 0.5cx + mcu_padding, 1.5cy]

          # Cut-out for the power switch
          - ref: matrix_inner_bottom
            shift: [ 0.5cx + mcu_padding,  0.5cy - 5]
          - ref: matrix_inner_bottom
            shift: [ 0.5cx + 4,  0.5cy - 5]
          - ref: matrix_inner_bottom
            shift: [ 0.5cx + 4, 0.5cy - 5 - 11.5]
            
          # Down into the thumb cluster
          - ref: thumbs_mod1_cluster 
            shift: [0.5cx, 0.5cy]
          - ref: thumbs_mod2_cluster 
            shift: [ 0.5cx,  0.5cy]
          - ref: thumbs_mod2_cluster 
            shift: [ 0.5cx,  -0.5cy]
          - ref: thumbs_mod2_cluster 
            shift: [ -0.5cx,  -0.5cy]
          - ref: thumbs_mod1_cluster 
            shift: [-0.5cx, -0.5cy]

          # Back up the bottom edge of the matrix
          - ref: matrix_inner_bottom  
            shift: [0.45cx, -0.55cy]
          - ref: matrix_inner_bottom  
            shift: [-0.5cx, -0.5cy]
          - ref: matrix_index_bottom  
            shift: [0.45cx, -0.5cy]
          - ref: matrix_index_bottom  
            shift: [-0.5cx, -0.5cy]
          - ref: matrix_middle_bottom  
            shift: [0.5cx, -0.5cy]
          - ref: matrix_middle_bottom  
            shift: [-0.5cx, -0.5cy]
          - ref: matrix_ring_bottom  
            shift: [0.5cx, -0.5cy]
          - ref: matrix_ring_bottom  
            shift: [-0.5cx, -0.5cy]
          - ref: matrix_pinky_bottom 
            shift: [0.5cx, -0.5cy]
          - ref: matrix_pinky_bottom 
            shift: [-0.5cx, -0.5cy]

    lhs:
      - name: pcb_outline
      - operation: subtract
        name: switches

    switch_block:
      # One big rectangle that bounds all switch positions
      - what: rectangle
        size: [300, 300]   # extra margin around the outermost switches
        adjust: 
          - shift: [120, -160]

      # Then subtract each switch “hole” from that big block
      - operation: subtract
        name: switches
pcbs:
  board:
    outlines:
      main:
        outline: pcb_outline
    footprints:
      choc_hotswap:
        what: choc
        where: true
        params:
          keycaps: false
          reverse: false
          hotswap: false
          from: "{{column_net}}"
          to: "{{colrow}}"
      diode:
        what: diode
        where: true
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
        adjust:
          shift: [7.5, 2]
          rotate: 90
      mcu:
        what: nice_nano_2
        where:
          ref: matrix_inner_top
          shift: [kx + 1, 7.2]
          rotate: -90
